services:

  airflow-init:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: airflow_init
    user: "${AIRFLOW_UID:-50000}:0"
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__FERNET_KEY=iy8fZrlDKDvk9ghU1R9_5Wq9cRkejh3kjN7jhMf7PNc=
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - airflow_db:/opt/airflow
      - ./dags:/opt/airflow/dags
      - ../:/opt/airflow/cip_project
    command: >
      bash -c "airflow db migrate && airflow users create --username admin --password admin --firstname admin --lastname admin --role Admin --email admin@example.com"

  airflow-webserver:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: airflow_webserver
    user: "${AIRFLOW_UID:-50000}:0"
    ports:
      - "8080:8080"
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__FERNET_KEY=iy8fZrlDKDvk9ghU1R9_5Wq9cRkejh3kjN7jhMf7PNc=
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=False
    volumes:
      - airflow_db:/opt/airflow
      - ./dags:/opt/airflow/dags
      - ../:/opt/airflow/cip_project
    command: >
      bash -c "sleep 5 && airflow webserver"
    depends_on:
      - airflow-init

  airflow-scheduler:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: airflow_scheduler
    user: "${AIRFLOW_UID:-50000}:0"
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__FERNET_KEY=iy8fZrlDKDvk9ghU1R9_5Wq9cRkejh3kjN7jhMf7PNc=
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - airflow_db:/opt/airflow
      - ./dags:/opt/airflow/dags
      - ../:/opt/airflow/cip_project
    command: >
      bash -c "sleep 5 && airflow scheduler"
    depends_on:
      - airflow-init

volumes:
  airflow_db:
