policy:
  policy_version: "v1.0"
  description: "Rule-based retention decision policy based on churn risk and CLV value"
  owner: "customer-intelligence-platform"
  created_at: "2026-02-19"

economics:
  margin_rate: 0.7     
  max_discount_cap: 0.4   

risk_buckets:
  low:
    churn_probability_max: 0.30
  medium:
    churn_probability_min: 0.30
    churn_probability_max: 0.60
  high:
    churn_probability_min: 0.60

value_buckets:
  low:
    clv_quantile: "bottom_33"
  medium:
    clv_quantile: "middle_33"
  high:
    clv_quantile: "top_33"

actions:
  low_risk:
    low_value:
      action_type: "none"
      discount_pct: 0.0
      reason: "Low churn risk and low customer value"
    medium_value:
      action_type: "none"
      discount_pct: 0.0
      reason: "Low churn risk does not justify incentive"
    high_value:
      action_type: "loyalty_perk"
      discount_pct: 0.05
      reason: "High value customer loyalty reinforcement"

  medium_risk:
    low_value:
      action_type: "none"
      discount_pct: 0.0
      reason: "Medium risk but low economic upside"
    medium_value:
      action_type: "discount"
      discount_pct: 0.10
      reason: "Moderate retention incentive for balanced risk/value"
    high_value:
      action_type: "discount"
      discount_pct: 0.20
      reason: "Protect high value customer at moderate risk"

  high_risk:
    low_value:
      action_type: "notify"
      discount_pct: 0.05
      reason: "High risk but limited discount due to low CLV"
    medium_value:
      action_type: "discount"
      discount_pct: 0.25
      reason: "Strong retention push for high churn risk"
    high_value:
      action_type: "discount"
      discount_pct: 0.35
      reason: "Aggressive retention for high-risk, high-value customer"
